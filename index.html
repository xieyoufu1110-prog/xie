<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猎奇の东西</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0a0a12;
            animation: bgFlow 15s ease infinite alternate;
            font-family: sans-serif;
        }

        @keyframes bgFlow {
            0% { background-color: #0a0a12; }
            50% { background-color: #151525; }
            100% { background-color: #0a0a1a; }
        }

        .snowflake {
            position: fixed;
            top: -10px;
            color: #fff;
            font-size: 10px;
            opacity: 0.7;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .video-wrap {
            width: 320px;
            height: 180px;
            border-radius: 12px;
            border: 3px solid #ffffff;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(255,255,255,0.6),
                        0 0 30px rgba(255,255,255,0.3),
                        0 0 45px rgba(255,255,255,0.15);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .next-btn {
            padding: 12px 35px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .next-btn:active {
            opacity: 0.8;
        }

        .tip {
            color: #00ff88;
            margin-top: 15px;
            font-size: 14px;
            height: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="video-wrap">
        <video id="mainVideo" controls></video>
    </div>

    <button class="next-btn" onclick="nextVideo()">换一个～</button>
    <div class="tip" id="tip"></div>

    <script>
        // 这里用你仓库的绝对地址，浏览器一定能找到
        const repoBase = "https://xieyoufu1110-prog.github.io/";
        const videoList = [
            repoBase + "7.mp4",
            repoBase + "8.mp4",
            repoBase + "78.mp4"
        ];
        let index = 0;
        const video = document.getElementById("mainVideo");
        const tip = document.getElementById("tip");

        video.src = videoList[index];
        tip.textContent = "当前：" + videoList[index].split('/').pop();

        function nextVideo() {
            index = (index + 1) % videoList.length;
            video.src = videoList[index];
            video.load();
            video.play();

            tip.textContent = "✅ 视频切换成功：" + videoList[index].split('/').pop();
            setTimeout(() => {
                tip.textContent = "";
            }, 3000);
        }

        function createSnowflake() {
            const snow = document.createElement("div");
            snow.className = "snowflake";
            snow.innerHTML = "❄";
            snow.style.left = Math.random() * 100 + "vw";
            snow.style.animationDuration = (Math.random() * 5 + 5) + "s";
            snow.style.fontSize = (Math.random() * 10 + 8) + "px";
            document.body.appendChild(snow);

            setTimeout(() => {
                snow.remove();
            }, 10000);
        }

        setInterval(createSnowflake, 300);
    </script>
</body>
</html>
