<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💕 表白墙</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "PingFang SC", "MiSans", sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: linear-gradient(135deg, #1a0a1f 0%, #2d1b33 30%, #3a2344 60%, #1a0a1f 100%);
  color: #fff;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.snow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

/* 登录卡片 */
.wrapper {
  position: relative;
  z-index: 20;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
}

.glass-card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 150, 200, 0.3);
  border-radius: 28px;
  width: 100%;
  max-width: 360px;
  padding: 40px 28px;
  box-shadow: 0 0 30px rgba(255, 100, 170, 0.15), inset 0 0 30px rgba(255, 150, 200, 0.05);
}

.card-title {
  font-size: 32px;
  font-weight: 700;
  color: #ffb3d1;
  text-align: center;
  margin-bottom: 32px;
  text-shadow: 0 0 10px rgba(255, 179, 209, 0.5);
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  font-size: 20px;
  font-weight: 600;
  color: #ffb3d1;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 18px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 150, 200, 0.3);
  border-radius: 20px;
  font-size: 16px;
  color: #fff;
  outline: none;
}

.form-input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.btn-primary {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #ff6b9d, #d45087);
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 18px;
  font-weight: 700;
  margin-top: 10px;
  box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
  cursor: pointer;
}

.tip-text {
  text-align: center;
  margin-top: 20px;
  font-size: 16px;
  color: rgba(255, 255, 255, 0.6);
}

.tip-text span {
  color: #ff80b0;
  font-weight: 600;
  cursor: pointer;
}

/* ========== 按你要求改的注册弹窗 ========== */
#regModal {
  position: fixed;
  top: 5%; /* 上移，不挡死登录 */
  left: 50%;
  transform: translateX(-50%) scale(0.8);
  width: 85%;
  max-width: 320px; /* 缩小弹窗宽度 */
  background: rgba(30, 20, 35, 0.98);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255, 150, 200, 0.4);
  border-radius: 28px;
  padding: 24px 20px;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

/* 打开动画 */
#regModal.show {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) scale(1);
}

/* 注册成功消失动画 */
#regModal.fade-out {
  transform: translateX(-50%) scale(0.4);
  opacity: 0;
}

#regModal .card-title {
  font-size: 34px;
  color: #ff6b9d;
  margin-bottom: 16px;
}

.avatar-preview {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 12px;
  display: block;
  border: 2px solid rgba(255, 150, 200, 0.4);
}

/* 注册+取消双按钮 */
.reg-buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
.btn-reg {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
.btn-confirm {
  background: linear-gradient(135deg, #ff6b9d, #d45087);
  color: #fff;
}
.btn-cancel {
  background: rgba(255,255,255,0.1);
  color: #ffb3d1;
}

/* 主表白墙 */
.wall {
  display: none;
  height: 100vh;
  overflow-y: auto;
  padding: 80px 20px 120px;
  -webkit-overflow-scrolling: touch;
}

.wall-title {
  text-align: center;
  font-size: 36px;
  font-weight: 700;
  color: #ffb3d1;
  margin-bottom: 30px;
  text-shadow: 0 0 10px rgba(255, 179, 209, 0.5);
}

.post-card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 150, 200, 0.25);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
}

.post-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.post-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255, 150, 200, 0.3);
}

.post-name {
  font-size: 22px;
  font-weight: 700;
  color: #ffb3d1;
}

.post-content {
  font-size: 16px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.9);
  margin: 10px 0;
}

.post-img {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  border-radius: 16px;
  margin: 8px 0;
}

.post-actions {
  display: flex;
  gap: 20px;
  font-size: 14px;
  color: #ffb3d1;
}

.fab {
  position: fixed;
  right: 24px;
  bottom: 100px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff6b9d, #d45087);
  color: #fff;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
  z-index: 40;
  cursor: pointer;
  display: none;
}

.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 998;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.8);
  width: 90%; max-width: 360px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,150,200,0.4);
  border-radius: 28px;
  padding: 30px;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.popup.active {
  transform: translate(-50%,-50%) scale(1);
  opacity: 1;
  pointer-events: auto;
}

.popup-title {
  font-size: 22px;
  color: #ffb3d1;
  text-align: center;
  margin-bottom: 20px;
}

.popup-input {
  width: 100%;
  padding: 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,150,200,0.3);
  border-radius: 16px;
  color: #fff;
  font-size: 16px;
  margin-bottom: 12px;
  resize: none;
}

.popup-btns {
  display: flex; gap: 12px; margin-top: 10px;
}

.popup-btn {
  flex:1; padding:16px; border-radius:16px; font-size:16px; font-weight:600; border:none; cursor: pointer;
}

.btn-send {
  background: linear-gradient(135deg,#ff6b9d,#d45087); color:#fff;
}
.btn-close {
  background: rgba(255,255,255,0.1); color:#ffb3d1;
}

.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translate(-50%, -60px);
  background: rgba(255,107,157,0.9);
  color: #fff;
  padding: 10px 24px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  transform: translate(-50%, 0);
  opacity: 1;
}

.copyright {
  position: fixed;
  bottom: 10px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 14px;
  color: rgba(255, 179, 209, 0.6);
  z-index: 60;
}
</style>
</head>
<body>

<canvas class="snow" id="snow"></canvas>
<div class="toast" id="toast"></div>

<!-- 登录 -->
<div class="wrapper">
  <div class="glass-card" id="loginBox">
    <div class="card-title">表白墙登录</div>
    <div class="form-group">
      <div class="form-label">用户名</div>
      <input class="form-input" id="loginUser" placeholder="请输入用户名">
    </div>
    <div class="form-group">
      <div class="form-label">密码</div>
      <input class="form-input" id="loginPwd" type="password" placeholder="请输入密码">
    </div>
    <button class="btn-primary" onclick="login()">登录</button>
    <div class="tip-text">没有账号？<span onclick="openReg()">去注册</span></div>
  </div>
</div>

<!-- 你要的注册弹窗（缩小、上移、带取消按钮、带动画） -->
<div id="regModal">
  <div class="card-title">注册账号</div>
  <img id="avatarPrev" class="avatar-preview" src="https://picsum.photos/200">
  <input type="file" id="avatarUpload" accept="image/*" style="color:#fff;margin:10px 0">
  <div class="form-group">
    <div class="form-label">用户名</div>
    <input class="form-input" id="regUser" placeholder="设置用户名">
  </div>
  <div class="form-group">
    <div class="form-label">密码</div>
    <input class="form-input" id="regPwd" type="password" placeholder="设置密码">
  </div>
  <div class="reg-buttons">
    <button class="btn-reg btn-cancel" onclick="closeReg()">取消</button>
    <button class="btn-reg btn-confirm" onclick="register()">注册</button>
  </div>
</div>

<!-- 主墙 -->
<div class="wall" id="wallBox">
  <div class="wall-title">💕 表白墙</div>
  <div id="postList"></div>
</div>

<div class="fab" id="fab" onclick="openPost()">+</div>
<div class="overlay" id="overlay"></div>

<div class="popup" id="postPopup">
  <div class="popup-title">发布表白</div>
  <textarea class="popup-input" id="postText" placeholder="写下你的心意..."></textarea>
  <input type="file" id="postImg" accept="image/*" style="color:#fff;margin-bottom:12px">
  <div class="popup-btns">
    <button class="popup-btn btn-close" onclick="closePost()">取消</button>
    <button class="popup-btn btn-send" onclick="publishPost()">发布</button>
  </div>
</div>

<div class="popup" id="commentPopup">
  <div class="popup-title">发表评论</div>
  <input class="popup-input" id="commentText" placeholder="写下评论...">
  <input type="file" id="commentImg" accept="image/*" style="color:#fff;margin-bottom:12px">
  <div class="popup-btns">
    <button class="popup-btn btn-close" onclick="closeComment()">取消</button>
    <button class="popup-btn btn-send" onclick="sendComment()">发送</button>
  </div>
</div>

<div class="copyright">© 2026 AetherWorks All Rights Reserved</div>

<script>
let users     = JSON.parse(localStorage.getItem("users")) || {};
let posts     = JSON.parse(localStorage.getItem("posts")) || [];
let me        = null;
let activeId  = null;
let myAvatar  = "";

const toastEl = document.getElementById("toast");
function showToast(text) {
  toastEl.innerText = text;
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 1500);
}

// 头像上传
document.getElementById("avatarUpload").onchange = function(e) {
  const f = e.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = (ev) => {
    myAvatar = ev.target.result;
    document.getElementById("avatarPrev").src = myAvatar;
  };
  r.readAsDataURL(f);
};

// 注册弹窗控制
const regModal = document.getElementById("regModal");
function openReg() {
  regModal.classList.add("show");
}
function closeReg() {
  regModal.classList.add("fade-out");
  setTimeout(() => {
    regModal.classList.remove("show", "fade-out");
  }, 400);
}

// 注册（带反馈 + 动画消失）
function register() {
  const u = document.getElementById("regUser").value.trim();
  const p = document.getElementById("regPwd").value.trim();

  if (!u) {
    showToast("请输入用户名");
    return;
  }
  if (!p) {
    showToast("请输入密码");
    return;
  }
  if (users[u]) {
    showToast("用户名已存在");
    return;
  }

  users[u] = {
    name: u,
    pwd: p,
    avatar: myAvatar || "https://picsum.photos/200"
  };
  localStorage.setItem("users", JSON.stringify(users));

  showToast("注册成功！");
  closeReg(); // 注册成功，带动画消失
}

// 登录
function login() {
  const u = document.getElementById("loginUser").value.trim();
  const p = document.getElementById("loginPwd").value.trim();

  if (!u || !p) {
    showToast("请输入账号密码");
    return;
  }
  if (!users[u]) {
    showToast("用户不存在");
    return;
  }
  if (users[u].pwd !== p) {
    showToast("密码错误");
    return;
  }

  me = users[u];
  showToast("登录成功");
  document.querySelector(".wrapper").style.display = "none";
  document.getElementById("wallBox").style.display = "block";
  document.getElementById("fab").style.display = "flex";
  renderPosts();
}

// 发布表白
function openPost() {
  document.getElementById("overlay").classList.add("active");
  document.getElementById("postPopup").classList.add("active");
}
function closePost() {
  document.getElementById("postPopup").classList.remove("active");
  setTimeout(() => document.getElementById("overlay").classList.remove("active"), 300);
}

function publishPost() {
  if (!me) {
    showToast("请先登录");
    return;
  }
  const txt = document.getElementById("postText").value.trim();
  if (!txt) {
    showToast("请输入内容");
    return;
  }

  posts.unshift({
    id: Date.now(),
    name: me.name,
    avatar: me.avatar,
    text: txt,
    comments: []
  });
  localStorage.setItem("posts", JSON.stringify(posts));
  closePost();
  renderPosts();
  showToast("发布成功");
}

// 评论
function openComment(id) {
  activeId = id;
  document.getElementById("overlay").classList.add("active");
  document.getElementById("commentPopup").classList.add("active");
}
function closeComment() {
  document.getElementById("commentPopup").classList.remove("active");
  setTimeout(() => document.getElementById("overlay").classList.remove("active"), 300);
}

function sendComment() {
  if (!me) return;
  const txt = document.getElementById("commentText").value.trim();
  if (!txt) {
    showToast("请输入评论");
    return;
  }
  const post = posts.find(x => x.id === activeId);
  if (post) {
    post.comments.push({ name: me.name, text: txt });
    localStorage.setItem("posts", JSON.stringify(posts));
    renderPosts();
    closeComment();
    showToast("评论成功");
  }
}

// 渲染
function renderPosts() {
  document.getElementById("postList").innerHTML = posts.map(p => `
  <div class="post-card">
    <div class="post-header">
      <img class="post-avatar" src="${p.avatar}">
      <div class="post-name">${p.name}</div>
    </div>
    <div class="post-content">${p.text}</div>
    <div class="post-actions">
      <div class="action-btn" onclick="openComment(${p.id})">💬 ${p.comments.length}</div>
    </div>
    ${p.comments.map(c => `
      <div style="font-size:14px;color:#ccc;margin-top:6px;padding-left:10px;border-left:2px solid #ff8da1">
        ${c.name}：${c.text}
      </div>
    `).join("")}
  </div>
  `).join("");
}

// 雪花
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");
let w = canvas.width = innerWidth;
let h = canvas.height = innerHeight;

class Snow {
  constructor() {
    this.x = Math.random()*w;
    this.y = Math.random()*-h;
    this.r = Math.random()*1.5+0.5;
    this.s = Math.random()*1+0.5;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.fill();
  }
  update() {
    this.y += this.s;
    if (this.y > h) this.y = -5;
  }
}
const snows = Array.from({length:80},()=>new Snow());
function snowLoop() {
  ctx.clearRect(0,0,w,h);
  snows.forEach(s => {s.update();s.draw();});
  requestAnimationFrame(snowLoop);
}
snowLoop();

window.onresize = () => {
  w = innerWidth;
  h = innerHeight;
  canvas.width = w;
  canvas.height = h;
};
</script>
</body>
</html>
