<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>琼山二中</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "MiSans", "PingFang SC", sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 30px;
}

/* 雪花画布 */
.snow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* 大头儿子 */
.head-img {
  width: 200px;
  height: 200px;
  object-fit: contain;
  border: 2px solid #111;
  border-radius: 12px;
  margin-bottom: 30px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
}

/* 文字发光 */
.title-text {
  font-size: 17px;
  text-align: center;
  line-height: 1.8;
  margin-bottom: 40px;
  color: #fff;
  text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff, 0 0 30px #ffffff;
  animation: glowText 2.5s infinite alternate;
}
@keyframes glowText {
  from { text-shadow: 0 0 8px #fff, 0 0 16px #fff; }
  to   { text-shadow: 0 0 14px #fff, 0 0 28px #fff, 0 0 40px #fff; }
}

/* 液态玻璃按钮 + 发光 */
.know-btn {
  padding: 16px 42px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 18px;
  color: #fff;
  font-size: 17px;
  font-weight: 500;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 
    0 0 0 1px rgba(255,255,255,0.2),
    0 8px 20px rgba(0,0,0,0.2),
    0 0 25px rgba(255,255,255,0.25);
  text-shadow: 0 0 8px #fff, 0 0 16px #fff;
  cursor: pointer;
  transition: all 0.3s ease;
}
.know-btn:active {
  background: rgba(255,255,255,0.18);
  box-shadow: 0 0 30px rgba(255,255,255,0.45);
  transform: scale(0.96);
}

/* 灵动岛风格视频弹窗 */
.island-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 8888;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.4s ease;
}
.island-modal.show {
  opacity: 1;
  visibility: visible;
}

/* 灵动岛盒子：白色边框 + 圆角 */
.island-box {
  width: 280px;
  height: 160px;
  border: 2px solid #fff;
  border-radius: 32px;
  overflow: hidden;
  position: relative;
  transform: scale(0.8) translateY(-40px);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.island-modal.show .island-box {
  transform: scale(1) translateY(0);
}

/* 视频铺满 */
.island-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- 雪花 -->
<canvas class="snow" id="snow"></canvas>

<!-- 灵动岛视频弹窗 -->
<div class="island-modal" id="island">
  <div class="island-box">
    <video class="island-video" src="A.mp4" loop playsinline></video>
  </div>
</div>

<!-- 大头儿子 -->
<img src="11.png" class="head-img">

<!-- 文字 -->
<div class="title-text">
祝琼山二中的同学们<br>
少起飞 少挖矿<br>
好好学习 天天向上
</div>

<!-- 按钮 -->
<button class="know-btn" onclick="showIsland()">我知道了</button>

<script>
// 灵动岛弹窗
const island = document.getElementById("island");
const video = document.querySelector(".island-video");

function showIsland() {
  island.classList.add("show");
  video.currentTime = 0;
  video.play();
}

function hideIsland() {
  island.classList.remove("show");
  video.pause();
}

// 点击任意空白关闭
island.onclick = hideIsland;

// 发光雪花
const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

let snowflakes = [];
class Snow {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * -h;
    this.r = Math.random() * 1.7 + 0.8;
    this.speed = Math.random() * 1.3 + 0.5;
  }
  update() {
    this.y += this.speed;
    if (this.y > h) {
      this.y = -5;
      this.x = Math.random() * w;
    }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.shadowColor = 'rgba(255,255,255,0.85)';
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function createSnow() {
  for (let i = 0; i < 120; i++) {
    snowflakes.push(new Snow());
  }
}
function animateSnow() {
  ctx.clearRect(0, 0, w, h);
  snowflakes.forEach(s => {
    s.update();
    s.draw();
  });
  requestAnimationFrame(animateSnow);
}
createSnow();
animateSnow();

window.onresize = () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
};
</script>

</body>
</html>
