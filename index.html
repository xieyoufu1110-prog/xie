<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动漫电视 · WebCat</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background: #0b1227;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  color: #fff;
}

#snow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.container {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.search-box {
  display: flex;
  gap: 10px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.2);
}
#keyword {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-size: 16px;
  padding: 6px 8px;
}
#keyword::placeholder {
  color: rgba(255,255,255,0.5);
}
#searchBtn {
  padding: 8px 16px;
  background: rgba(251,114,153,0.85);
  border: none;
  border-radius: 16px;
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s ease;
}
#searchBtn:active {
  transform: scale(0.95);
}

.video-info {
  padding: 10px 14px;
  background: rgba(255,255,255,0.08);
  border-radius: 16px;
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.15);
}
.video-title {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.video-up {
  font-size: 12px;
  color: #fb7299;
}

.player-wrap {
  aspect-ratio: 16/9;
  border-radius: 24px;
  overflow: hidden;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 2px solid rgba(255,255,255,0.15);
  padding: 4px;
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 20px;
}

.list-wrap {
  flex: 1;
  overflow-y: auto;
  padding-right: 6px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.video-item {
  padding: 12px 14px;
  background: rgba(255,255,255,0.07);
  border-radius: 16px;
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.1);
}
.video-item:active {
  transform: scale(0.98);
  background: rgba(251,114,153,0.15);
}
.item-title {
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-up {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}

.load-more {
  text-align: center;
  padding: 12px;
  color: #fb7299;
  font-size: 14px;
  font-weight: 600;
}
</style>
</head>

<body>
<canvas id="snow"></canvas>

<div class="container">
  <div class="search-box">
    <input type="text" id="keyword" placeholder="搜动漫/电视剧/电影/综艺" value="动漫">
    <button id="searchBtn">搜索</button>
  </div>

  <div class="video-info">
    <div class="video-title" id="videoTitle">准备播放</div>
    <div class="video-up" id="videoUp">UP主：-</div>
  </div>

  <div class="player-wrap">
    <iframe id="player" allowfullscreen></iframe>
  </div>

  <div class="list-wrap" id="videoList"></div>
  <div class="load-more" onclick="loadMore()">加载更多</div>
</div>

<script>
const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');
let w, h, snowArr = [];
function resize(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();
class Snow{
  constructor(){
    this.x=Math.random()*w;
    this.y=Math.random()*h;
    this.r=Math.random()*2+1;
    this.speedY=Math.random()*1+0.5;
    this.opacity=Math.random()*0.5+0.3;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${this.opacity})`;
    ctx.fill();
  }
  update(){
    this.y+=this.speedY;
    if(this.y>h)this.y=0;
  }
}
for(let i=0;i<120;i++)snowArr.push(new Snow());
function loop(){
  ctx.clearRect(0,0,w,h);
  snowArr.forEach(s=>{s.update();s.draw();});
  requestAnimationFrame(loop);
}
loop();

let page=1,kw="动漫",list=[];
const player=document.getElementById('player');
const listEl=document.getElementById('videoList');

async function search(p=1){
  let url=`https://api.bilibili.com/x/web-interface/search/all/v2?keyword=${encodeURIComponent(kw)}&page=${p}&page_size=20`;
  let r=await fetch(url);
  let d=await r.json();
  return d.data.result.find(i=>i.result_type==='video')?.data||[];
}

function render(data){
  data.forEach((v,i)=>{
    let div=document.createElement('div');
    div.className='video-item';
    div.innerHTML=`<div class="item-title">${v.title.replace(/<[^>]+>/g,'')}</div><div class="item-up">${v.author}</div>`;
    div.onclick=()=>{
      player.src=`https://player.bilibili.com/player.html?bvid=${v.bvid}&page=1`;
      document.getElementById('videoTitle').innerText=v.title.replace(/<[^>]+>/g,'');
      document.getElementById('videoUp').innerText='UP：'+v.author;
    };
    listEl.appendChild(div);
  });
}

async function go(){
  kw=document.getElementById('keyword').value.trim();
  page=1;
  listEl.innerHTML='';
  list=await search(1);
  render(list);
}

async function loadMore(){
  page++;
  let more=await search(page);
  render(more);
}

document.getElementById('searchBtn').onclick=go;
document.getElementById('keyword').onkeydown=e=>{if(e.key==='Enter')go()};
go();
</script>
</body>
</html>
